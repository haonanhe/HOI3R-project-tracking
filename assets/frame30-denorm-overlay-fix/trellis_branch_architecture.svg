<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset="1" stop-color="#0d1728"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#132238"/>
      <stop offset="1" stop-color="#0f1a2c"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#7dd3fc"/>
    </marker>
    <style>
      .title { font: 800 34px Inter, Arial, sans-serif; fill: #e2e8f0; }
      .subtitle { font: 500 16px Inter, Arial, sans-serif; fill: #93c5fd; }
      .section { font: 700 18px Inter, Arial, sans-serif; fill: #f8fafc; }
      .box-title { font: 700 18px Inter, Arial, sans-serif; fill: #f8fafc; }
      .box-text { font: 500 14px Inter, Arial, sans-serif; fill: #cbd5e1; }
      .small { font: 600 13px Inter, Arial, sans-serif; fill: #93c5fd; }
      .warn-title { font: 700 18px Inter, Arial, sans-serif; fill: #fef3c7; }
      .warn-text { font: 500 14px Inter, Arial, sans-serif; fill: #fde68a; }
    </style>
  </defs>
  <rect width="1440" height="980" rx="28" fill="url(#bg)"/>
  <text x="48" y="58" class="title">Current DexYCB TRELLIS-Style Hand/Object Branch</text>
  <text x="48" y="86" class="subtitle">One-frame overfit path used by the latest published frame-30 experiment</text>

  <rect x="40" y="120" width="320" height="270" rx="24" fill="url(#panel)" stroke="#334155"/>
  <text x="64" y="156" class="section">1. DexYCB Input And Batch Build</text>
  <rect x="64" y="178" width="272" height="72" rx="16" fill="#10243a" stroke="#3b82f6"/>
  <text x="82" y="206" class="box-title">DexYCB Toolkit Loader</text>
  <text x="82" y="228" class="box-text">color / labels / pose_y / pose_m / intrinsics</text>
  <text x="82" y="246" class="box-text">object mesh from toolkit OBJ, hand mesh from MANO path</text>
  <rect x="64" y="268" width="272" height="98" rx="16" fill="#10243a" stroke="#22c55e"/>
  <text x="82" y="296" class="box-title">build_dexycb_trellis_batch</text>
  <text x="82" y="318" class="box-text">hand_vertices_canonical = hand_ct - hand_root_ct</text>
  <text x="82" y="336" class="box-text">object_vertices_canonical = object local vertices</text>
  <text x="82" y="354" class="box-text">exports hand/object poses, GT world meshes, T_ct_from_w</text>

  <rect x="400" y="120" width="320" height="270" rx="24" fill="url(#panel)" stroke="#334155"/>
  <text x="424" y="156" class="section">2. Codec And Scene Conditioning</text>
  <rect x="424" y="178" width="272" height="84" rx="16" fill="#10243a" stroke="#a78bfa"/>
  <text x="442" y="206" class="box-title">Custom trellis_mesh_codec.py</text>
  <text x="442" y="228" class="box-text">per-slot min/max normalization</text>
  <text x="442" y="246" class="box-text">quantize vertices to sparse grid tokens</text>
  <text x="442" y="264" class="box-text">pool vertex features -> latent coords + latent feats</text>
  <rect x="424" y="282" width="272" height="84" rx="16" fill="#10243a" stroke="#38bdf8"/>
  <text x="442" y="310" class="box-title">Scene Tokens</text>
  <text x="442" y="332" class="box-text">T_ct_from_w + intrinsics + hand_root_w + object_centroid_w</text>
  <text x="442" y="350" class="box-text">shared scene summary conditions both hand and object</text>

  <rect x="760" y="120" width="320" height="270" rx="24" fill="url(#panel)" stroke="#334155"/>
  <text x="784" y="156" class="section">3. Shared Native TRELLIS Decoder</text>
  <rect x="784" y="178" width="272" height="84" rx="16" fill="#10243a" stroke="#f59e0b"/>
  <text x="802" y="206" class="box-title">trellis_shared_decoder.py</text>
  <text x="802" y="228" class="box-text">scene_proj + hand_head / object_head</text>
  <text x="802" y="246" class="box-text">hand and object both use shared native decoder trunk</text>
  <rect x="784" y="282" width="272" height="84" rx="16" fill="#10243a" stroke="#ef4444"/>
  <text x="802" y="310" class="box-title">SLatMeshDecoder + FlexiCubes</text>
  <text x="802" y="332" class="box-text">native sparse transformer blocks + upsample</text>
  <text x="802" y="350" class="box-text">extract mesh from sparse SDF / deform / weights</text>

  <rect x="1120" y="120" width="280" height="270" rx="24" fill="#2a1a11" stroke="#f59e0b"/>
  <text x="1144" y="156" class="warn-title">Still Different From Original TRELLIS</text>
  <text x="1144" y="188" class="warn-text">• no native TRELLIS encoder</text>
  <text x="1144" y="212" class="warn-text">• no pretrained structured latent weights</text>
  <text x="1144" y="236" class="warn-text">• custom per-sample codec semantics</text>
  <text x="1144" y="260" class="warn-text">• simplified scene token construction</text>
  <text x="1144" y="284" class="warn-text">• tsdf regularizer path still disabled</text>
  <text x="1144" y="308" class="warn-text">• edge-based SDF topology regularizer missing</text>

  <rect x="40" y="470" width="520" height="250" rx="24" fill="url(#panel)" stroke="#334155"/>
  <text x="64" y="506" class="section">4. Coordinate Recovery And Geometry Supervision</text>
  <rect x="64" y="528" width="472" height="84" rx="16" fill="#10243a" stroke="#22c55e"/>
  <text x="82" y="556" class="box-title">Recent Fix: Normalized Cube -> Metric Local BBox</text>
  <text x="82" y="578" class="box-text">decoder mesh vertices live in native [-0.5, 0.5] cube</text>
  <text x="82" y="596" class="box-text">now de-normalized to the reference hand/object local bbox before pose transform</text>
  <rect x="64" y="628" width="472" height="68" rx="16" fill="#10243a" stroke="#3b82f6"/>
  <text x="82" y="656" class="box-title">Lift To World / Camera</text>
  <text x="82" y="678" class="box-text">apply hand_pose_w / object_pose_w -> world mesh -> T_ct_from_w -> camera space</text>

  <rect x="600" y="470" width="480" height="250" rx="24" fill="url(#panel)" stroke="#334155"/>
  <text x="624" y="506" class="section">5. TRELLIS-Style Losses</text>
  <rect x="624" y="528" width="432" height="76" rx="16" fill="#10243a" stroke="#38bdf8"/>
  <text x="642" y="556" class="box-title">MeshRenderer Supervision</text>
  <text x="642" y="578" class="box-text">render GT/pred mask, depth, normal; compare in image space</text>
  <rect x="624" y="620" width="432" height="84" rx="16" fill="#10243a" stroke="#a78bfa"/>
  <text x="642" y="648" class="box-title">Current Objective</text>
  <text x="642" y="670" class="box-text">mask_loss + depth_loss + normal_loss + mesh reg_loss</text>
  <text x="642" y="688" class="box-text">+ empty_mesh_penalty + sdf_presence_loss</text>

  <rect x="1120" y="470" width="280" height="250" rx="24" fill="#182614" stroke="#22c55e"/>
  <text x="1144" y="506" class="section">6. Current Diagnosis</text>
  <text x="1144" y="538" class="box-text">Projection bug is fixed:</text>
  <text x="1144" y="562" class="small">object valid projections: 0 -> 9</text>
  <text x="1144" y="594" class="box-text">Remaining failure:</text>
  <text x="1144" y="618" class="small">object occupancy still collapses to a tiny patch</text>
  <text x="1144" y="650" class="box-text">Why:</text>
  <text x="1144" y="674" class="small">decoder is native TRELLIS-style,</text>
  <text x="1144" y="694" class="small">but encoder/latent + topology regularization are not</text>

  <path d="M360 255H400" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M720 255H760" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M920 390V430H300V470" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M920 390V430H840V470" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1080 595H1120" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M140 390V430H1260V470" stroke="#7dd3fc" stroke-width="3" stroke-dasharray="10 10" marker-end="url(#arrow)"/>

  <text x="874" y="416" class="subtitle">normalized-cube mesh output</text>
  <text x="126" y="450" class="subtitle">pose recovery path</text>
  <text x="1098" y="453" class="subtitle">render loss drives training</text>
</svg>
